[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*


# CRITICAL: Async configuration to prevent "Event loop is closed" errors after i run my tests ... -> test Ok
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# test execution options
addopts = 
    -v
    --strict-markers
    --tb=short
    -p no:warnings

# markers
markers = 
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    unit: marks tests as unit tests
    slow: marks tests as slow running
    integration: marks tests as integration tests (require infrastructure)
    vectordb: marks tests that require PostgreSQL/pgvector
    mongodb: marks tests that require MongoDB
    keycloak: marks tests that require Keycloak

# logging
log_cli = false
log_cli_level = INFO

# cov settings (when using pytest --cov)
[coverage:run]
source = app
omit = 
    */tests/*
    */__pycache__/*
    */venv/*
    */.venv/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING: